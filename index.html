<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Boogiebrainlogshub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d0d0d;
      color: white;
    }
    header {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: #111;
    }
    .logo {
      font-weight: bold;
    }
    .balance {
      color: #00ff99;
    }
    .container {
      padding: 20px;
    }
    .product {
      background: #1a1a1a;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }
    button {
      background: #00ff99;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 5px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">BOOGIEBRAINLOGSHUB</div>
  <div class="balance">₦0.00</div>
</header>

<div class="container" id="product-container">
  <h2>Loading products...</h2>
</div>

<script>
const container = document.getElementById("product-container");
fetch("https://boogiebrain-backend.onrender.com/products")
  .then(res => res.json())
  .then(products => {
    container.innerHTML = "";
    products.forEach(p => {
      const div = document.createElement("div");
      div.className = "product";
      div.innerHTML = `
        <h3>${p.name}</h3>
        <p>₦${p.price}</p>
        <button onclick="buyProduct(${p.id}, '${p.name}', ${p.price})">Buy</button>
      `;
      container.appendChild(div);
    });
  })
  .catch(err => {
    container.innerHTML = "<p>Failed to load products</p>";
    console.error(err);
  });

function buyProduct(id, name, price) {
  alert(`You clicked BUY for ${name} (₦${price})`);
  // Later: connect to wallet & checkout
}
</script>

<h2>Premium Accounts • Instant Delivery • Secure Wallet</h2>

<div class="product">
  <h3>🇺🇸 USA Facebook 2010–2020</h3>
  <p>₦8000</p>
  <button>Buy</button>
</div>

<div class="product">
  <h3>❤️ Dating Facebook</h3>
  <p>₦25000</p>
  <button>Buy</button>
</div>

<div class="product">
  <h3>🎬 Netflix Premium</h3>
  <p>₦5000</p>
  <button>Buy</button>
</div>

</div>

</body>
</html>
<script>
let cart = [];

function buyProduct(id, name, price) {
  cart.push({ id, name, price });
  alert(`${name} added to cart`);
  updateCart();
}

function updateCart() {
  console.log("Cart:", cart);
}
</script>
